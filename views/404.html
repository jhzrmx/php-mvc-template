<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; margin: auto; box-sizing: border-box; text-align: center; background-color: #f8f8f8; }
        div.container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1.title { font-size: 50px; color: #333; }
        p.message { font-size: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">404 - Page Not Found</h1>
        <p class="message">The page you are looking for does not exist.</p>
    </div>
</body>
</html>
