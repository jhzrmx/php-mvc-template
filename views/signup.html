<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
        .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h1 { margin: 0 0 1.5rem; font-size: 1.5rem; color: #1a1a1a; }
        label { display: block; margin-bottom: 0.25rem; font-size: 0.9rem; color: #444; }
        input { width: 100%; padding: 0.6rem 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 0.75rem; background: #42b72a; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #36a420; }
        .error { background: #fee; color: #c00; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .links { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
        .links a { color: #1877f2; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sign up</h1>
        <div id="error" class="error"></div>
        <form id="form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
            <label for="email">Email (optional)</label>
            <input type="email" id="email" name="email" autocomplete="email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
            <button type="submit">Create account</button>
        </form>
        <p class="links">Already have an account? <a href="/login">Log in</a></p>
    </div>
    <script>
        (function () {
            var form = document.getElementById('form');
            var errorEl = document.getElementById('error');
            var btn = form.querySelector('button');
            function showError(msg) {
                errorEl.textContent = msg || '';
                errorEl.style.display = msg ? 'block' : 'none';
            }
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                showError('');
                btn.disabled = true;
                btn.textContent = 'Creating account...';
                var payload = {
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value,
                    email: document.getElementById('email').value.trim() || undefined
                };
                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(function (r) {
                    if (!r.ok) {
                        return r.json().then(function (d) {
                            throw new Error(`${d.error}: ${d.message}` || 'Sign up failed');
                        });
                    }
                    return r.json();
                })
                .then(function () {
                    window.location.href = '/dashboard';
                })
                .catch(function (err) {
                    showError(err.message || 'Sign up failed');
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.textContent = 'Create account';
                });
            });
        })();
    </script>
</body>
</html>
